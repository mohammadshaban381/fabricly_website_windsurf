<!--
  Newsletter signup — static (wires up to Formspree/Netlify Forms later).
-->
<section class="px-5 py-12 lg:px-16 lg:py-20" aria-labelledby="newsletter-title">
  <div class="mx-auto max-w-[768px] text-center">
    <h2 id="newsletter-title" class="font-heading text-3xl font-bold text-[#24201a] sm:text-4xl">
      Stay in the loop
    </h2>
    <p class="mt-3 font-body text-base text-[#24201a]/80 sm:text-lg">
      Sourcing tips, fabric trends, and Fabricly updates — straight to your inbox.
    </p>
    <form class="mx-auto mt-6 flex max-w-md flex-col gap-3 sm:flex-row" data-newsletter>
      <label for="newsletter-email" class="sr-only">Email address</label>
      <input
        id="newsletter-email"
        type="email"
        required
        autocomplete="email"
        placeholder="you@company.com"
        class="flex-1 rounded border border-[#0c0801]/30 bg-white px-3 py-2 font-body text-base text-[#24201a] placeholder:text-[#0c0801]/40 focus:border-[#c9a84c] focus:outline-none focus:ring-2 focus:ring-[#c9a84c]/40"
      />
      <button type="submit" class="btn-primary justify-center">Subscribe</button>
    </form>
  </div>
</section>
