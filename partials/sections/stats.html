<!--
  Stats section — 4 KPI counters. Edit numbers/labels per page.
-->
<section class="px-5 py-12 lg:px-16 lg:py-20" aria-labelledby="stats-title">
  <div class="mx-auto max-w-[1280px]">
    <h2 id="stats-title" class="sr-only">Key statistics</h2>
    <dl class="grid grid-cols-2 gap-6 lg:grid-cols-4 lg:gap-10">
      <div class="text-center lg:text-left">
        <dt class="font-heading text-4xl font-bold text-[#a0863c] sm:text-5xl lg:text-6xl" data-stat-value>500+</dt>
        <dd class="mt-2 font-body text-sm text-[#24201a] sm:text-base">Brands served globally</dd>
      </div>
      <div class="text-center lg:text-left">
        <dt class="font-heading text-4xl font-bold text-[#a0863c] sm:text-5xl lg:text-6xl" data-stat-value>10M+</dt>
        <dd class="mt-2 font-body text-sm text-[#24201a] sm:text-base">Garments produced</dd>
      </div>
      <div class="text-center lg:text-left">
        <dt class="font-heading text-4xl font-bold text-[#a0863c] sm:text-5xl lg:text-6xl" data-stat-value>24h</dt>
        <dd class="mt-2 font-body text-sm text-[#24201a] sm:text-base">Quote turnaround</dd>
      </div>
      <div class="text-center lg:text-left">
        <dt class="font-heading text-4xl font-bold text-[#a0863c] sm:text-5xl lg:text-6xl" data-stat-value>15+</dt>
        <dd class="mt-2 font-body text-sm text-[#24201a] sm:text-base">Years of expertise</dd>
      </div>
    </dl>
  </div>
</section>
