<!--
  Generic Content Card — reusable for products, fabrics, blog posts, services.
  Duplicate this <article> as needed inside a grid container.
-->
<article class="card group" data-component="card">
  <a href="#" class="block focus:outline-none focus-visible:ring-2 focus-visible:ring-[#c9a84c] focus-visible:ring-offset-2 rounded-lg">
    <div class="aspect-[4/3] overflow-hidden rounded-lg bg-neutral-100">
      <img src="/public/images/products/placeholder.jpg" alt=""
           class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-105"
           loading="lazy" decoding="async" />
    </div>
    <div class="mt-4">
      <p class="font-body text-xs font-medium uppercase tracking-wider text-[#a0863c]">Category</p>
      <h3 class="mt-2 font-heading text-xl font-bold text-[#24201a] group-hover:text-[#a0863c]">
        Card title goes here
      </h3>
      <p class="mt-2 font-body text-sm leading-[1.5] text-[#24201a]/80">
        Short description for this card item — concise, scannable copy.
      </p>
    </div>
  </a>
</article>
