<!--
  Generic Section Header (eyebrow + heading + subtitle)
  Use as a partial OR inline. To use inline with custom content, replace the
  data-* attributes after fetch via JS, or just copy this markup directly.
-->
<header class="mx-auto max-w-[768px] text-center px-5 py-10 lg:px-0 lg:py-14" data-component="section-header">
  <p class="font-body text-sm font-medium uppercase tracking-wider text-[#a0863c]" data-section-eyebrow>
    Tagline
  </p>
  <h2 class="mt-3 font-heading text-3xl font-bold leading-tight text-[#24201a] sm:text-4xl lg:text-[44px]" data-section-title>
    Section heading goes here
  </h2>
  <p class="mt-4 font-body text-base leading-[1.5] text-[#24201a] sm:text-lg" data-section-subtitle>
    Optional supporting paragraph that gives context to this section.
  </p>
</header>
